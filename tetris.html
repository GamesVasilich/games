<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тетрис</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .game-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      padding: 30px;
      text-align: center;
      width: 100%;
      max-width: 400px;
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
      font-size: 2.5rem;
    }
    .game-area {
      position: relative;
      width: 240px;
      height: 400px;
      background: black;
      border: 2px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin: 0 auto 20px;
    }
    .score-board {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
      color: #333;
    }
    .score-board div {
      font-size: 1.2rem;
      font-weight: bold;
    }
    button {
      padding: 12px 24px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: background 0.3s;
      margin: 5px;
    }
    button:hover {
      background: #3e8e41;
    }

    /* Мобильные кнопки управления */
    .mobile-controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 280px;
      margin: 20px auto;
    }
    .control-btn {
      font-size: 1.5rem;
      padding: 15px;
      background: #333;
      color: white;
      border: none;
      border-radius: 10px;
      touch-action: manipulation;
    }
    .control-btn:active {
      background: #555;
      transform: scale(0.95);
    }
    .control-btn.rotate {
      grid-column: 3;
      grid-row: 1 / 3;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>Тетрис</h1>

    <div class="score-board">
      <div>Счёт: <span id="score">0</span></div>
      <div>Уровень: <span id="level">1</span></div>
      <div>Линии: <span id="lines">0</span></div>
    </div>

    <div class="game-area" id="game-area"></div>

    <!-- Мобильные кнопки -->
    <div class="mobile-controls">
      <button class="control-btn" id="btn-left">←</button>
      <button class="control-btn" id="btn-down">↓</button>
      <button class="control-btn" id="btn-right">→</button>
      <button class="control-btn rotate" id="btn-rotate">↻</button>
    </div>

    <button onclick="restartGame()">Начать заново</button>

    <div class="cube" onclick="location.href='index.html'">в меню</div>
  </div>

  <script>
    // Настройки игры
    const COLS = 10;
    const ROWS = 20;
    const BLOCK_SIZE = 24;
    const COLORS = [
      null,
      '#FF0D72', // I
      '#0DC2FF', // J
      '#0DFF92', // L
      '#F538FF', // O
      '#FF8138', // S
      '#FFE438', // Z
      '#3877FF'  // T
    ];

    // Элементы DOM
    const gameArea = document.getElementById('game-area');
    const scoreElement = document.getElementById('score');
    const levelElement = document.getElementById('level');
    const linesElement = document.getElementById('lines');

    // Кнопки мобильного управления
    const btnLeft = document.getElementById('btn-left');
    const btnDown = document.getElementById('btn-down');
    const btnRight = document.getElementById('btn-right');
    const btnRotate = document.getElementById('btn-rotate');

    // Игровые переменные
    let score = 0;
    let lines = 0;
    let level = 1;
    let dropCounter = 0;
    let dropInterval = 1000; // мс
    let lastTime = 0;
    let isGameOver = false;

    // Игровое поле (2D массив)
    let board = Array.from({length: ROWS}, () => Array(COLS).fill(0));

    // Текущая фигура
    let piece = {
      type: '',
      matrix: [],
      pos: {x: 0, y: 0}
    };

    // Все типы фигур
    const PIECES = {
      'I': [[0,1,0,0], [0,1,0,0], [0,1,0,0], [0,1,0,0]],
      'J': [[1,0,0], [1,1,1], [0,0,0]],
      'L': [[0,0,1], [1,1,1], [0,0,0]],
      'O': [[1,1], [1,1]],
      'S': [[0,1,1], [1,1,0], [0,0,0]],
      'Z': [[1,1,0], [0,1,1], [0,0,0]],
      'T': [[0,1,0], [1,1,1], [0,0,0]]
    };

    // Создание нового блока
    function createPiece() {
      const types = Object.keys(PIECES);
      const type = types[Math.floor(Math.random() * types.length)];
      piece.type = type;
      piece.matrix = PIECES[type];
      piece.pos.x = Math.floor((COLS - piece.matrix[0].length) / 2);
      piece.pos.y = 0;
    }

    // Рисование игрового поля
    function draw() {
      gameArea.innerHTML = '';

      // Рисуем ячейки
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (board[y][x]) {
            const block = document.createElement('div');
            block.style.position = 'absolute';
            block.style.width = `${BLOCK_SIZE}px`;
            block.style.height = `${BLOCK_SIZE}px`;
            block.style.left = `${x * BLOCK_SIZE}px`;
            block.style.top = `${y * BLOCK_SIZE}px`;
                        block.style.backgroundColor = COLORS[board[y][x]];
            block.style.border = '1px solid #000';
            gameArea.appendChild(block);
          }
        }
      }

      // Рисуем текущую фигуру
      for (let y = 0; y < piece.matrix.length; y++) {
        for (let x = 0; x < piece.matrix[y].length; x++) {
          if (piece.matrix[y][x]) {
            const block = document.createElement('div');
            block.style.position = 'absolute';
            block.style.width = `${BLOCK_SIZE}px`;
            block.style.height = `${BLOCK_SIZE}px`;
            block.style.left = `${(piece.pos.x + x) * BLOCK_SIZE}px`;
            block.style.top = `${(piece.pos.y + y) * BLOCK_SIZE}px`;
            block.style.backgroundColor = COLORS[piece.matrix[y][x]];
            block.style.border = '1px solid #000';
            gameArea.appendChild(block);
          }
        }
      }
    }

    // Проверка на столкновение
    function isCollision() {
      for (let y = 0; y < piece.matrix.length; y++) {
        for (let x = 0; x < piece.matrix[y].length; x++) {
          if (piece.matrix[y][x] &&
              (piece.pos.y + y >= ROWS ||
               piece.pos.x + x < 0 ||
               piece.pos.x + x >= COLS ||
               board[piece.pos.y + y][piece.pos.x + x])) {
            return true;
          }
        }
      }
      return false;
    }

    // Закрепление фигуры на поле
    function mergePiece() {
      for (let y = 0; y < piece.matrix.length; y++) {
        for (let x = 0; x < piece.matrix[y].length; x++) {
          if (piece.matrix[y][x]) {
            board[piece.pos.y + y][piece.pos.x + x] = piece.matrix[y][x];
          }
        }
      }
    }

    // Удаление полных линий
    function clearLines() {
      let linesCleared = 0;

      for (let y = ROWS - 1; y >= 0; y--) {
        if (board[y].every(cell => cell !== 0)) {
          board.splice(y, 1);
          board.unshift(Array(COLS).fill(0));
          linesCleared++;
          y++; // Проверяем ту же строку снова после сдвига
        }
      }

      if (linesCleared > 0) {
        lines += linesCleared;
        score += [40, 100, 300, 1200][linesCleared - 1] * level;
        level = Math.floor(lines / 10) + 1;
        dropInterval = 1000 - (level - 1) * 50; // Ускорение с уровнем

        linesElement.textContent = lines;
        scoreElement.textContent = score;
        levelElement.textContent = level;
      }
    }

    // Перемещение фигуры вниз
    function moveDown() {
      piece.pos.y++;
      if (isCollision()) {
        piece.pos.y--;
        mergePiece();
        clearLines();
        createPiece();

        if (isCollision()) { // Игра окончена
          isGameOver = true;
          alert(`Игра окончена! Ваш счёт: ${score}`);
          restartGame();
        }
      }
    }

    // Перемещение влево
    function moveLeft() {
      piece.pos.x--;
      if (isCollision()) piece.pos.x++;
    }

    // Перемещение вправо
    function moveRight() {
      piece.pos.x++;
      if (isCollision()) piece.pos.x--;
    }

    // Поворот фигуры
    function rotate() {
      const original = [...piece.matrix]; // Сохраняем оригинал

      // Создаём повёрнутую матрицу (транспонирование + отражение по горизонтали)
      piece.matrix = piece.matrix.map((row, y) =>
        row.map((cell, x) => original[piece.matrix.length - 1 - x][y])
      );

      // Проверяем коллизии после поворота
      if (isCollision()) {
        piece.matrix = original; // Возвращаем исходную матрицу
      }
    }

    // Основной игровой цикл
    function update(time = 0) {
      if (isGameOver) return;

      const delta = time - lastTime;
      lastTime = time;

      dropCounter += delta;
      if (dropCounter > dropInterval) {
        moveDown();
        dropCounter = 0;
      }

      draw();
      requestAnimationFrame(update);
    }

    // Перезапуск игры
    function restartGame() {
      board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
      score = 0;
      lines = 0;
      level = 1;
      isGameOver = false;
      dropInterval = 1000;
      dropCounter = 0;

      scoreElement.textContent = '0';
      linesElement.textContent = '0';
      levelElement.textContent = '1';

      createPiece();
      update();
    }

    // Обработчики клавиш
    document.addEventListener('keydown', event => {
      switch (event.key) {
        case 'ArrowLeft':
          moveLeft();
          break;
        case 'ArrowRight':
          moveRight();
          break;
        case 'ArrowDown':
          moveDown();
          break;
        case 'ArrowUp':
          rotate();
          break;
        case ' ': // Пробел — мгновенное падение
          while (!isCollision()) moveDown();
          break;
      }
    });

    // Обработчики мобильных кнопок
    btnLeft.addEventListener('click', moveLeft);
    btnDown.addEventListener('click', moveDown);
    btnRight.addEventListener('click', moveRight);
    btnRotate.addEventListener('click', rotate);

    // Запуск игры при загрузке страницы
    window.onload = function() {
      createPiece();
      update();
    };
  </script>
</body>
</html>
