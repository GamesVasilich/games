<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Змейка | Galaxy Arcade</title>
  <style>
    :root {
      --primary: #00f2fe;
      --secondary: #4facfe;
      --accent: #f093fb;
      --snake-head: #00f2fe;
      --snake-body: rgba(0, 242, 254, 0.6);
      --food: #ff5722;
      --bg: #0b0b1a;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --smooth: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 50%, #1b2735 0%, #090a0f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
      overflow: hidden;
      touch-action: none;
    }

    .container {
      background: var(--glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 30px;
      padding: 20px;
      text-align: center;
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      width: 95%;
      max-width: 400px;
      animation: fadeIn 0.8s var(--smooth);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      background: linear-gradient(45deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #score {
      font-size: 1.4rem;
      margin-bottom: 15px;
      color: #ffeb3b;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255, 235, 59, 0.4);
    }

    #game-area {
      width: 100%;
      height: 0;
      padding-top: 100%; /* Квадрат */
      position: relative;
      background: rgba(0, 0, 0, 0.4);
      border: 2px solid var(--glass-border);
      border-radius: 15px;
      margin: 0 auto 20px;
      overflow: hidden;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }

    /* СТИЛЬ ЗМЕЙКИ */
    .snake-part {
      position: absolute;
      width: 5vw;
      height: 5vw;
      max-width: 20px;
      max-height: 20px;
      background: var(--snake-body);
      border-radius: 6px;
      box-shadow: 0 0 10px var(--primary);
      transition: all 0.1s linear;
    }

    .food {
      position: absolute;
      width: 5vw;
      height: 5vw;
      max-width: 20px;
      max-height: 20px;
      background: var(--food);
      border-radius: 50%;
      box-shadow: 0 0 15px var(--food);
      animation: pulse Food 1s infinite;
    }

    @keyframes pulseFood {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* УПРАВЛЕНИЕ */
    .controls-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 220px;
      margin: 0 auto 15px;
    }

    .control-btn {
      width: 60px;
      height: 60px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      color: white;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s var(--smooth);
    }

    .control-btn:active {
      background: var(--primary);
      color: #000;
      transform: scale(0.9);
    }

    .btn-up { grid-column: 2; }
    .btn-left { grid-column: 1; }
    .btn-down { grid-column: 2; }
    .btn-right { grid-column: 3; }

    button.main-btn {
      padding: 12px 24px;
      background: linear-gradient(45deg, var(--secondary), var(--primary));
      color: #000;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      margin-bottom: 10px;
      transition: 0.3s;
    }

    button:active { transform: scale(0.95); }
    .btn-menu { background: #34495e; }

    button.main-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4); }

    .back-link {
      display: block;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Змейка</h1>
    <div id="score">Счёт: 0</div>
    <div id="game-area"></div>

    <div class="controls-container">
      <button class="control-btn btn-up" onclick="setDir('up')">↑</button>
      <button class="control-btn btn-left" onclick="setDir('left')">←</button>
      <button class="control-btn btn-down" onclick="setDir('down')">↓</button>
      <button class="control-btn btn-right" onclick="setDir('right')">→</button>
    </div>

    <button class="main-btn" onclick="resetGame()">НАЧАТЬ ЗАНОВО</button>

    <button class="btn-menu" onclick="window.location.href='../index.html'">В меню</button>
  </div>

  <script>
    const gameArea = document.getElementById('game-area');
    const scoreDisplay = document.getElementById('score');
    let snake = [{ x: 10, y: 10 }];
    let food = { x: 15, y: 15 };
    let dx = 0, dy = -1;
    let score = 0;
    let gameLoop;
    let isGameOver = false;

    const GRID_SIZE = 20;

    function getCellSize() {
      return gameArea.clientWidth / GRID_SIZE;
    }

    function createElement(className, x, y, isHead = false) {
      const element = document.createElement('div');
      element.className = className;
      const cellSize = getCellSize();
      element.style.left = x * cellSize + 'px';
      element.style.top = y * cellSize + 'px';
      if (isHead) {
        element.style.background = 'var(--primary)';
        element.style.zIndex = '2';
      }
      gameArea.appendChild(element);
      return element;
    }

    function drawSnake() {
      snake.forEach((part, index) => {
        createElement('snake-part', part.x, part.y, index === 0);
      });
    }

    function generateFood() {
      food.x = Math.floor(Math.random() * GRID_SIZE);
      food.y = Math.floor(Math.random() * GRID_SIZE);
      for (let part of snake) {
        if (part.x === food.x && part.y === food.y) {
          generateFood();
          return;
        }
      }
    }

    function gameUpdate() {
      if (isGameOver) return;

      const newHead = { x: snake[0].x + dx, y: snake[0].y + dy };

      // Столкновения
      if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE || 
          snake.some(part => part.x === newHead.x && part.y === newHead.y)) {
        isGameOver = true;
        clearInterval(gameLoop);
        alert(`ИГРА ОКОНЧЕНА!\nВаш счёт: ${score}`);
        return;
      }

      snake.unshift(newHead);

      if (newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        scoreDisplay.textContent = `Счёт: ${score}`;
        generateFood();
      } else {
        snake.pop();
      }

      gameArea.innerHTML = '';
      drawSnake();
      createElement('food', food.x, food.y);
    }

    function setDir(dir) {
      if (dir === 'up' && dy !== 1) { dx = 0; dy = -1; }
      if (dir === 'down' && dy !== -1) { dx = 0; dy = 1; }
      if (dir === 'left' && dx !== 1) { dx = -1; dy = 0; }
      if (dir === 'right' && dx !== -1) { dx = 1; dy = 0; }
    }

    function resetGame() {
      isGameOver = false;
      snake = [{ x: 10, y: 10 }];
      dx = 0; dy = -1;
      score = 0;
      scoreDisplay.textContent = 'Счёт: 0';
      gameArea.innerHTML = '';
      generateFood();
      clearInterval(gameLoop);
      gameLoop = setInterval(gameUpdate, 250);
    }

    // Клавиатура
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp') setDir('up');
      if (e.key === 'ArrowDown') setDir('down');
      if (e.key === 'ArrowLeft') setDir('left');
      if (e.key === 'ArrowRight') setDir('right');
    });

    // Авто-запуск
    resetGame();
  </script>
</body>
</html>
