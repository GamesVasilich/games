<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игра на память — Pro Version</title>
  <style>
    :root {
      --primary: #00f2fe;
      --secondary: #4facfe;
      --accent: #f093fb;
      --bg: #0b0b1a;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --smooth: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 50%, #1b2735 0%, #090a0f 100%);
      margin: 0;
      padding: 15px;
      min-height: 100vh;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      max-width: 800px;
      width: 100%;
      background: var(--glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 30px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
      padding: 25px;
      animation: fadeIn 0.8s var(--smooth);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 { 
      background: linear-gradient(45deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2rem;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .level-selector {
      margin: 20px 0;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .level-btn {
      padding: 10px 18px;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      color: white;
      background: var(--glass);
      transition: all 0.3s var(--smooth);
    }

    .level-btn.easy { border-color: #4caf50; }
    .level-btn.medium { border-color: #ff9800; }
    .level-btn.hard { border-color: #f44336; }
    .level-btn.custom { border-color: var(--accent); }
    .level-btn:hover { background: white; color: black; transform: scale(1.05); }

    .custom-form {
      margin: 15px auto;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      display: none;
      border: 1px solid var(--glass-border);
    }

    .custom-form input {
      background: #000;
      border: 1px solid var(--primary);
      color: white;
      padding: 5px;
      border-radius: 5px;
      margin: 0 5px;
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: rgba(0,0,0,0.4);
      padding: 15px;
      border-radius: 15px;
      margin: 15px 0;
      font-size: 0.9rem;
      border: 1px solid var(--glass-border);
    }

    #grid {
      display: grid;
      gap: 12px;
      margin: 20px auto;
      justify-content: center;
      grid-template-columns: repeat(var(--cols), 1fr);
      max-width: 100%;
    }

    .card {
      width: 65px;
      height: 65px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s var(--smooth);
      cursor: pointer;
    }

    .card.flipped { transform: rotateY(180deg); }
    
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .card-front { 
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .card-back {
      background: #1b262c;
      color: white;
      transform: rotateY(180deg);
      border: 2px solid var(--primary);
    }
    
    .card.matched .card-back { border-color: #4caf50; box-shadow: 0 0 15px #4caf50; }
    .card.mismatched .card-back { border-color: #f44336; box-shadow: 0 0 15px #f44336; }

    #subtitle { height: 25px; color: var(--accent); font-weight: bold; margin: 10px; text-shadow: 0 0 10px var(--accent); }

    .settings { margin: 15px 0; font-size: 0.85rem; color: #aaa; }

    .btn-action {
      padding: 12px 25px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid var(--glass-border);
      border-radius: 15px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      width: 100%;
    }

    .btn-action:hover { background: white; color: black; }

    /* КНОПКА В МЕНЮ */
    .back-link {
      display: inline-block;
      margin-top: 25px;
      color: var(--accent);
      text-decoration: none;
      font-weight: bold;
      font-size: 0.9rem;
      border: 1px solid var(--accent);
      padding: 10px 20px;
      border-radius: 12px;
      transition: all 0.3s;
    }
    .back-link:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

  </style>
</head>
<body>

  <div class="container">
    <h1>Memory Game</h1>
    
    <div class="level-selector">
      <button class="level-btn easy" onclick="startGame(4, 3)">4x3</button>
      <button class="level-btn medium" onclick="startGame(4, 4)">4x4</button>
      <button class="level-btn hard" onclick="startGame(6, 4)">6x4</button>
      <button class="level-btn custom" onclick="toggleCustom()">Свой размер</button>
    </div>

    <div id="custom-form" class="custom-form">
      Ширина: <input type="number" id="width" value="4" min="2" max="8" style="width:50px">
      Высота: <input type="number" id="height" value="4" min="2" max="6" style="width:50px">
      <button onclick="startCustomGame()">OK</button>
    </div>

    <div class="stats-container">
      <div id="timer">⏱ 00:00</div>
      <div id="score">⭐ Пар: 0 / 0</div>
      <div>🎯 Точность: <span id="accuracy">0%</span></div>
    </div>

    <div id="subtitle"></div>
    <div class="grid" id="grid"></div>

    <div class="settings">
        <input type="checkbox" id="subtitle-toggle"> <label for="subtitle-toggle">Озвучивать карты</label>
    </div>

    <button class="btn-action" onclick="resetCurrentGame()">Перемешать</button>
    
    <button class="back-link" onclick="window.location.href='../index.html'">В меню</button>
  </div>

  <script>
    const symbols = ['💜', '⭐', '❤️', '♠', '♦', '♣', '♥', '☯', '⚡', '❄', '✨', '🔮', '🐉', '👑', '💎', '🍀', '🍕', '🚀', '🎮', '🌈', '🌸', '🍂', '🐱', '🦊', '🍎', '⚽'];
    
    let cardsData = [];
    let flippedCards = [];
    let matches = 0;
    let attempts = 0;
    let totalPairs = 0;
    let gridSize = { cols: 4, rows: 3 };
    let timerInterval;
    let seconds = 0;
    let isProcessing = false;

    function startGame(cols, rows) {
      if ((cols * rows) % 2 !== 0) {
        alert("Количество карточек должно быть четным!");
        return;
      }
      gridSize = { cols, rows };
      initBoard();
    }

    function toggleCustom() {
      const f = document.getElementById('custom-form');
      f.style.display = f.style.display === 'block' ? 'none' : 'block';
    }

    function startCustomGame() {
      const w = parseInt(document.getElementById('width').value);
      const h = parseInt(document.getElementById('height').value);
      startGame(w, h);
    }

    function initBoard() {
      clearInterval(timerInterval);
      seconds = 0;
      updateTimerDisplay();
      timerInterval = setInterval(() => { seconds++; updateTimerDisplay(); }, 1000);

      matches = 0;
      attempts = 0;
      flippedCards = [];
      isProcessing = false;
      totalPairs = (gridSize.cols * gridSize.rows) / 2;
      
      document.getElementById('accuracy').textContent = '0%';
      document.getElementById('score').innerHTML = `⭐ Пар: 0 / ${totalPairs}`;
      document.getElementById('subtitle').textContent = '';

      let gameSymbols = [...symbols];
      while (gameSymbols.length < totalPairs) {
        gameSymbols.push(Math.floor(Math.random() * 100));
      }
      
      const selected = gameSymbols.sort(() => 0.5 - Math.random()).slice(0, totalPairs);
      cardsData = [...selected, ...selected].sort(() => 0.5 - Math.random());

      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      grid.style.setProperty('--cols', gridSize.cols);

      cardsData.forEach((symbol, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = index;
        card.dataset.symbol = symbol;

        card.innerHTML = `
          <div class="card-face card-front">?</div>
          <div class="card-face card-back">${symbol}</div>
        `;

        card.addEventListener('click', () => handleFlip(card));
        grid.appendChild(card);
      });
    }

    function handleFlip(card) {
      if (isProcessing || card.classList.contains('flipped') || card.classList.contains('matched')) return;

      card.classList.add('flipped');
      flippedCards.push(card);

      if (document.getElementById('subtitle-toggle').checked) {
        document.getElementById('subtitle').textContent = `Открыто: ${card.dataset.symbol}`;
      }

      if (flippedCards.length === 2) {
        isProcessing = true;
        attempts++;
        checkMatch();
      }
    }

    function checkMatch() {
      const [card1, card2] = flippedCards;
      const isMatch = card1.dataset.symbol === card2.dataset.symbol;

      if (isMatch) {
        matches++;
        card1.classList.add('matched');
        card2.classList.add('matched');
        completeTurn();
      } else {
        card1.classList.add('mismatched');
        card2.classList.add('mismatched');
        setTimeout(() => {
          card1.classList.remove('flipped', 'mismatched');
          card2.classList.remove('flipped', 'mismatched');
          completeTurn();
        }, 1000);
      }

      const acc = attempts > 0 ? Math.round((matches / attempts) * 100) : 0;
      document.getElementById('accuracy').textContent = `${acc}%`;
      document.getElementById('score').innerHTML = `⭐ Пар: ${matches} / ${totalPairs}`;

      if (matches === totalPairs) {
        clearInterval(timerInterval);
        setTimeout(() => alert(`Браво! Победа за ${formatTime(seconds)}!`), 500);
      }
    }

    function completeTurn() {
      flippedCards = [];
      isProcessing = false;
      if (document.getElementById('subtitle-toggle').checked) {
        document.getElementById('subtitle').textContent = '';
      }
    }

    function updateTimerDisplay() {
      document.getElementById('timer').textContent = `⏱ ${formatTime(seconds)}`;
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60).toString().padStart(2, '0');
      const s = (sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function resetCurrentGame() {
      initBoard();
    }

    window.onload = () => startGame(4, 3);
  </script>
</body>
</html>
