<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Shooter Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }
        /* Зоны джойстиков */
        #joystick-move { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; z-index: 20; }
        #joystick-look { position: absolute; bottom: 50px; right: 50px; width: 120px; height: 120px; z-index: 20; }
        
        /* Кнопки действий */
        .action-btns { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 30; }
        .btn {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            background: rgba(255, 255, 255, 0.3); color: white; font-weight: bold;
            backdrop-filter: blur(5px);
        }
        #btn-shoot { background: rgba(233, 69, 96, 0.6); }
    </style>
</head>
<body>

<div id="ui">
    <div>HP: <span id="hp">100</span> | Team: Terror</div>
    <div id="status">Ждем игроков...</div>
</div>

<div id="crosshair"></div>

<div id="joystick-move"></div>
<div id="joystick-look"></div>

<div class="action-btns">
    <button class="btn" id="btn-shoot">FIRE</button>
    <button class="btn" id="btn-action">BOMB</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, clock;
    let moveDir = { x: 0, y: 0 };
    let lookDir = { x: 0, y: 0 };
    
    init();
    setupJoysticks();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.6;
        camera.rotation.order = 'YXZ';

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(light);

        // Пол
        const grid = new THREE.GridHelper(100, 50, 0xff0000, 0x444444);
        scene.add(grid);

        // Стрельба и действия
        document.getElementById('btn-shoot').ontouchstart = (e) => { e.preventDefault(); shoot(); };
        document.getElementById('btn-action').ontouchstart = (e) => { e.preventDefault(); console.log("Bomb action"); };

        clock = new THREE.Clock();
    }

    function setupJoysticks() {
        // Джойстик ХОДЬБЫ (слева)
        const moveJoy = nipplejs.create({
            zone: document.getElementById('joystick-move'),
            mode: 'static', position: { left: '60px', bottom: '60px' },
            color: 'white'
        });
        moveJoy.on('move', (evt, data) => {
            moveDir.x = data.vector.x;
            moveDir.y = data.vector.y;
        });
        moveJoy.on('end', () => { moveDir = { x: 0, y: 0 }; });

        // Джойстик КАМЕРЫ (справа)
        const lookJoy = nipplejs.create({
            zone: document.getElementById('joystick-look'),
            mode: 'static', position: { right: '60px', bottom: '60px' },
            color: 'red'
        });
        lookJoy.on('move', (evt, data) => {
            lookDir.x = data.vector.x;
            lookDir.y = data.vector.y;
        });
        lookJoy.on('end', () => { lookDir = { x: 0, y: 0 }; });
    }

    function shoot() {
        // Логика выстрела
        const flash = new THREE.PointLight(0xffaa00, 10, 5);
        flash.position.set(camera.position.x, camera.position.y, camera.position.z);
        scene.add(flash);
        setTimeout(() => scene.remove(flash), 50);
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        // Вращение камерой от правого джойстика
        if (lookDir.x !== 0 || lookDir.y !== 0) {
            camera.rotation.y -= lookDir.x * 0.05;
            camera.rotation.x += lookDir.y * 0.05;
            camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
        }

        // Движение от левого джойстика
        if (moveDir.x !== 0 || moveDir.y !== 0) {
            const speed = 4 * delta;
            // Движение относительно взгляда камеры
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const side = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            forward.y = 0; side.y = 0; // Чтоб не взлетал

            camera.position.add(forward.multiplyScalar(moveDir.y * speed));
            camera.position.add(side.multiplyScalar(moveDir.x * speed));
        }

        renderer.render(scene, camera);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
