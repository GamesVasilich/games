<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 Игровой Хаб | Galaxy Arcade</title>
  <style>
    /* ------------------- ОСНОВНЫЕ СТИЛИ И ФОН ------------------- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      /* Стильный анимированный фон-градиент */
      background: linear-gradient(-45deg, #1f084a, #000000, #4c0f7b, #1f084a);
      background-size: 400% 400%;
      animation: gradient-animation 15s ease infinite;
      min-height: 100vh;
      color: #E0E0FF; /* Мягкий белый/светло-голубой текст */
    }

    @keyframes gradient-animation {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    
    /* ------------------- СТИЛИ ЗАГОЛОВКОВ ------------------- */
    h0, h1, h2, h3 {
      text-align: center;
      margin: 30px 0 20px;
      /* Неоновый эффект для заголовков */
      text-shadow: 0 0 5px #00FFFF, 0 0 10px #00FFFF, 0 0 15px rgba(0, 128, 255, 0.7);
    }
    h0 {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: 2px;
    }
    h1 {
      font-size: 3rem;
    }
    h2 {
      font-size: 2.2rem;
    }
    h3 {
      font-size: 1.8rem;
      margin-top: 40px;
      color: #FFD700; /* Золотой цвет для категории */
      text-shadow: 0 0 5px #FF8C00;
      padding-bottom: 5px;
      border-bottom: 2px solid rgba(255, 215, 0, 0.3);
      width: 80%;
      margin-left: auto;
      margin-right: auto;
    }

    /* ------------------- СТИЛИ КНОПОК/ХАБА ------------------- */
    .grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px 0;
    }
    
    .cube {
      width: 300px;
      height: 90px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(0, 0, 0, 0.1));
      border: 2px solid #1abc9c; /* Основной цвет неоновой рамки */
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: #1abc9c; /* Цвет текста */
      cursor: pointer;
      transition: all 0.4s ease;
      
      /* Неоновый свет */
      box-shadow: 0 0 15px rgba(26, 188, 156, 0.5), 0 0 25px rgba(26, 188, 156, 0.2);
      user-select: none;
      text-decoration: none;
      text-transform: uppercase;
    }
    
    .cube:hover {
      /* Эффект свечения при наведении */
      color: #fff;
      background: #1abc9c;
      transform: scale(1.05) rotateX(5deg);
      box-shadow: 0 0 20px #1abc9c, 0 0 40px #1abc9c, 0 5px 15px rgba(0,0,0,0.5);
      border-color: #fff;
    }
    
    /* ------------------- АДАПТИВНОСТЬ ------------------- */
    @media (max-width: 768px) {
      h0 { font-size: 3rem; }
      h1 { font-size: 2.5rem; }
      h2 { font-size: 2rem; }
      h3 { font-size: 1.6rem; }
      .cube { width: 260px; height: 75px; font-size: 1.3rem; }
    }
    
    @media (max-width: 480px) {
      h0 { font-size: 2.5rem; }
      h1 { font-size: 2rem; }
      h2 { font-size: 1.8rem; }
      h3 { font-size: 1.4rem; margin-top: 30px; }
      .cube { width: 240px; height: 65px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h0>ИГРОВОЙ ХАБ</h0>
    <h1>Добро пожаловать в Galaxy Arcade</h1>

    <h3>Категория: 🎮 Простые игры</h3>
    <div class="grid">
      <a class="cube" href='tictactoe.html'>Крестики-нолики</a>
      <a class="cube" href='match3.html'>3 в ряд</a>
      <a class="cube" href='memory.html'>Память</a>
      <a class="cube" href='quiz.html'>Викторина</a>
      <a class="cube" href='snake.html'>Змейка</a>
      <a class="cube" href='tetris.html'>Тетрис</a>
    </div>
    
    <div style="border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin: 40px auto; width: 50%;"></div>

    <h3>Категория: 🕹️ 3D-игры</h3>
    <div class="grid">
      <a class="cube" href='3DGEIM/3DGEIM.html'>3D-игра: Minecraft Clone</a>
    </div>
    
    <div style="border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin: 40px auto; width: 50%;"></div>

    <h2>⭐ Лучшие игры по версии игроков</h2>
    <div class="grid">
      <a class="cube" href='memory.html'>Память (Топ 1)</a>
      <a class="cube" href='match3.html'>3 в ряд (Топ 2)</a>
    </div>
  </div>
</body>
</html>
