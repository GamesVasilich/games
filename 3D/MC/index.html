<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MINECRAFT</title>
    <link rel="icon" type="image/png" href="icon.png">

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; touch-action: none; }
        #menu { position: fixed; inset: 0; background: #222; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
         #owermenu { position: fixed; inset: 0; background: #ower222; z-index: 1010; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .slot-container { display: flex; align-items: center; margin: 10px; gap: 5px; }
        .slot-btn { width: 180px; padding: 15px; background: #4d9a30; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .del-btn { width: 45px; padding: 15px; background: #b22222; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .dl-btn { width: 45px; padding: 15px; background: #2ecc71; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; }
        
        #import-zone { margin-bottom: 20px; padding: 10px; border: 2px dashed #555; border-radius: 10px; }
        
        #btn-save { position: absolute; top: 10px; right: 10px; padding: 10px 15px; background: #e67e22; border: none; color: white; border-radius: 5px; z-index: 20; font-weight: bold; display: none; }
        #landscape-msg { display: none; position: fixed; inset: 0; background: #111; color: white; z-index: 10000; justify-content: center; align-items: center; text-align: center; flex-direction: column; }
        @media (orientation: portrait) { #landscape-msg { display: flex; } }
        
        #ui { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px #000; pointer-events: none; z-index: 5; font-size: 14px; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; }
        #joy-zone { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; z-index: 10; opacity: 0.7; }
        .controls-right { position: absolute; bottom: 20px; right: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; z-index: 10; }
        .btn-act { width: 65px; height: 65px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; color: white; font-weight: bold; }
        #btn-jump { grid-column: span 2; height: 45px; border-radius: 20px; }
        #inventory-screen { display: none; position: fixed; inset: 20px; background: rgba(0,0,0,0.9); z-index: 2000; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; padding: 20px; border: 2px solid #555; border-radius: 10px; overflow-y: auto; }
        .inv-item { aspect-ratio: 1; border: 2px solid #444; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; text-align: center; cursor: pointer; font-weight: bold; }
        #hotbar { position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); display: flex; gap: 3px; background: rgba(0,0,0,0.8); padding: 5px; border-radius: 8px; z-index: 10; }
        .slot { min-width: 40px; height: 40px; border: 2px solid #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: white; text-align: center; cursor: pointer; }
        .selected { border-color: #00ff00; background: rgba(0,255,0,0.2); }
    </style>
</head>
<body>

<div id="landscape-msg"><h1>ПЕРЕВЕРНИ ЭКРАН 🔄</h1><p>Играй в альбомном режиме!</p></div>

<div id="menu">
    <div style="position: absolute; top: 10px; left: 10px; text-align: left; z-index: 1001;">
    </div>

    <h1>MINECRAFT</h1>
    <div id="slots-list" style="overflow-y: auto; max-height: 70vh; padding: 10px;"></div>
    <div id="import-zone" style="position: absolute; top: 20px; left: 20px; text-align: left; border: 1px dashed #555; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.05);">
    <small style="color: #aaa; display: block; margin-bottom: 5px;">ИМПОРТ .mcworld:</small>
    <input type="file" id="file-input" accept=".mcworld" style="font-size: 10px; color: white;">
</div>

</div>


<div id="inventory-screen"></div>
<button id="btn-save" onclick="saveWorld()">СОХРАНИТЬ</button>
<div id="ui">Блоков: <span id="b-count">0</span> | <span id="coords">0,0,0</span> <br> <span id="weather-ui">Ясно</span></div>
<div id="crosshair"></div>
<div id="joy-zone"></div>

<div class="controls-right">
    <button class="btn-act" id="btn-jump">JUMP</button>
    <button class="btn-act" onclick="toggleInventory()" style="background: #555">INV</button>
    <button class="btn-act" style="background: rgba(255,0,0,0.4)" id="btn-break">DIG</button>
    <button class="btn-act" style="background: rgba(0,255,0,0.4)" id="btn-place">BUILD</button>
</div>

<div id="hotbar">
    <div class="slot selected" id="slot-1" onclick="setSlot(1, 1)" style="background: #4d9a30">Трава</div>
    <div class="slot" id="slot-2" onclick="setSlot(2, 2)" style="background: #777">Камень</div>
    <div class="slot" id="slot-3" onclick="setSlot(3, 3)" style="background: #8b4513">Доски</div>
    <div class="slot" id="slot-4" onclick="setSlot(4, 4)" style="background: #b22222">Кирпич</div>
    <div class="slot" id="slot-5" onclick="setSlot(5, 5)" style="background: #add8e6; color: #000">Стекло</div>
    <div class="slot" id="slot-6" onclick="setSlot(6, 6)" style="background: #228b22">Листва</div>
    <div class="slot" id="slot-7" onclick="setSlot(7, 7)" style="background: #00ffff; color: #000">Алмаз</div>
    <div class="slot" id="slot-8" onclick="setSlot(8, 8)" style="background: #444">Уголь</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, clock, sun;
    let moveDir = { x: 0, y: 0 }, velocity = new THREE.Vector3(0,0,0), canJump = false;
    let selectedBlock = 1, currentSlot = 0;
    let isRaining = false, dayTime = 0;
    const blocks = [];
    
    const blockData = {
        1: { name: "Трава", color: 0x4d9a30 }, 2: { name: "Камень", color: 0x777777 },
        3: { name: "Доски", color: 0x8b4513 }, 4: { name: "Кирпич", color: 0xb22222 },
        5: { name: "Стекло", color: 0xadd8e6, op: 0.6 }, 6: { name: "Листва", color: 0x228b22 },
        7: { name: "Алмаз", color: 0x00ffff }, 8: { name: "Уголь", color: 0x333333 },
        9: { name: "Золото", color: 0xffd700 }, 10: { name: "Железо", color: 0xdcdcdc },
        11: { name: "Песок", color: 0xedc9af }, 12: { name: "Дерево", color: 0x5d4037 },
        21: { name: "дикор_0", color: 0xedc9f, image= }, 12: { name: "дикор_1", color: 0x5d9037 },
    };

    function renderMenu() {
        const list = document.getElementById('slots-list');
        list.innerHTML = '';
        for(let i=0; i<4; i++) {
            const cont = document.createElement('div');
            cont.className = 'slot-container';
            
            const b = document.createElement('button');
            b.className = 'slot-btn'; b.innerText = `МИР ${i+1}`;
            b.onclick = () => startGame(i);
            
            const dl = document.createElement('button');
            dl.className = 'dl-btn'; dl.innerHTML = '📥';
            dl.onclick = () => downloadWorld(i);

            const d = document.createElement('button');
            d.className = 'del-btn'; d.innerText = 'X';
            d.onclick = () => deleteWorld(i);
            
            cont.append(b, dl, d); list.append(cont);
        }
    }
    renderMenu();

    // ФУНКЦИЯ СКАЧИВАНИЯ МИРА
    window.downloadWorld = (slot) => {
        const data = localStorage.getItem('mc_save_v2_' + slot);
        if(!data) return alert("Мир пуст!");
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `world_${slot+1}.mcworld`;
        a.click();
    };

    // ФУНКЦИЯ ИМПОРТА МИРА
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const slot = prompt("В какой слот импортировать? (1-4)", "1");
            if(slot >= 1 && slot <= 4) {
                localStorage.setItem('mc_save_v2_' + (slot-1), event.target.result);
                alert("Мир импортирован!");
                renderMenu();
            }
        };
        reader.readAsText(file);
    };

    window.deleteWorld = (slot) => {
        if(confirm("Удалить навсегда?")) {
            localStorage.removeItem('mc_save_v2_' + slot);
            renderMenu();
        }
    };

    function startGame(slot) {
        currentSlot = slot;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('btn-save').style.display = 'block';
        initInventory(); init(); setupControls(); animate();
    }

    function initInventory() {
        const inv = document.getElementById('inventory-screen');
        inv.innerHTML = ''; 
        Object.keys(blockData).forEach(id => {
            const item = document.createElement('div');
            item.className = 'inv-item';
            item.style.background = `#${blockData[id].color.toString(16).padStart(6, '0')}`;
            item.innerText = blockData[id].name;
            item.onclick = () => {
                selectedBlock = parseInt(id);
                document.getElementById('slot-1').style.background = item.style.background;
                document.getElementById('slot-1').innerText = blockData[id].name;
                window.setSlot(1, selectedBlock);
                toggleInventory();
            };
            inv.appendChild(item);
        });
    }

    window.toggleInventory = () => {
        const inv = document.getElementById('inventory-screen');
        inv.style.display = inv.style.display === 'grid' ? 'none' : 'grid';
    };

        function init() {
        scene = new THREE.Scene();
        clock = new THREE.Clock();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.rotation.order = 'YXZ';
        
        const rawData = localStorage.getItem('mc_save_v2_' + currentSlot);
        if(rawData) {
            const parsed = JSON.parse(rawData);
            if(parsed[0] && parsed[0].playerPos) {
                camera.position.copy(parsed[0].playerPos);
                camera.rotation.set(parsed[0].playerRot.x, parsed[0].playerRot.y, 0);
                parsed.shift(); 
            } else {
                camera.position.set(30, 20, 30);
            }
            parsed.forEach(b => createBlock(b.x, b.y, b.z, b.t));
        } else {
            camera.position.set(30, 20, 30);
            const seed1 = Math.random() * 100;
            const seed2 = Math.random() * 100;
            
            for (let x = 0; x < 60; x++) {
                for (let z = 0; z < 60; z++) {
                    const wave1 = Math.sin(x / 8 + seed1) * Math.cos(z / 8 + seed1) * 5;
                    const wave2 = Math.sin(x / 3 + seed2) * Math.sin(z / 3 + seed2) * 2;
                    const h = Math.floor(wave1 + wave2 + 5);

                    for (let y = -3; y <= h; y++) {
                        let type = 2; 
                        if (y === h) {
                            type = 1; 
                        } else if (y > h - 2) {
                            type = Math.random() > 0.2 ? 2 : 1; 
                        }
                        createBlock(x, y, z, type);
                    }
                }
            }
        } // Конец блока else

        renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        sun = new THREE.DirectionalLight(0xffffff, 1.0);
        scene.add(new THREE.AmbientLight(0xffffff, 0.45), sun);
        updateBlockCount();
    } // Конец функции init


    window.saveWorld = () => {
        // ФУНКЦИЯ 1: СОХРАНЕНИЕ ПОЗИЦИИ (Добавляем первым объектом в массив)
        const worldData = [
            { 
                playerPos: camera.position, 
                playerRot: {x: camera.rotation.x, y: camera.rotation.y} 
            },
            ...blocks.map(b => ({ x: b.position.x, y: b.position.y, z: b.position.z, t: b.userData.type }))
        ];
        localStorage.setItem('mcworld_' + currentSlot, JSON.stringify(worldData));
        alert("успешно");
    };

    function createBlock(x, y, z, type) {
        const d = blockData[type] || blockData[1];
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshLambertMaterial({ color: d.color, transparent: !!d.op, opacity: d.op || 1 }));
        mesh.position.set(x, y, z);
        mesh.userData.type = type;
        mesh.matrixAutoUpdate = false;
        mesh.updateMatrix();
        scene.add(mesh);
        blocks.push(mesh);
    }

    function setupControls() {
        const joy = nipplejs.create({ zone: document.getElementById('joy-zone'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'white' });
        joy.on('move', (e, d) => { moveDir.x = d.vector.x; moveDir.y = d.vector.y; });
        joy.on('end', () => { moveDir = {x:0, y:0}; });

        let tx, ty, isLooking = false;
        document.addEventListener('touchstart', e => { if (e.touches[0].pageX > window.innerWidth / 2) { isLooking = true; tx = e.touches[0].pageX; ty = e.touches[0].pageY; } });
        document.addEventListener('touchmove', e => {
            if (isLooking && tx !== undefined) {
                camera.rotation.y -= (e.touches[0].pageX - tx) * 0.007;
                camera.rotation.x -= (e.touches[0].pageY - ty) * 0.007;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                tx = e.touches[0].pageX; ty = e.touches[0].pageY;
            }
        });
        document.addEventListener('touchend', () => isLooking = false);
        document.getElementById('btn-jump').ontouchstart = (e) => { e.preventDefault(); if(canJump){ velocity.y = 7.8; canJump = false; } };
        document.getElementById('btn-break').ontouchstart = (e) => { e.preventDefault(); interact(true); };
        document.getElementById('btn-place').ontouchstart = (e) => { e.preventDefault(); interact(false); };
    }

    function interact(isBreak) {
        const ray = new THREE.Raycaster();
        ray.setFromCamera({x: 0, y: 0}, camera);
        const hits = ray.intersectObjects(blocks);
        if (hits.length > 0 && hits[0].distance < 5) {
            if (isBreak) {
                scene.remove(hits[0].object);
                blocks.splice(blocks.indexOf(hits[0].object), 1);
            } else {
                const p = hits[0].object.position.clone().add(hits[0].face.normal);
                if(p.distanceTo(new THREE.Vector3(camera.position.x, p.y, camera.position.z)) > 0.8) createBlock(p.x, p.y, p.z, selectedBlock);
            }
            updateBlockCount();
        }
    }

    function checkCollision(pos) {
        for(let b of blocks) {
            const dx = Math.abs(pos.x - b.position.x);
            const dz = Math.abs(pos.z - b.position.z);
            if(dx < 0.7 && dz < 0.7) {
                const dyFoot = (pos.y - 1.6) - b.position.y;
                const dyHead = (pos.y + 0.2) - b.position.y;
                if (Math.abs(dyFoot) < 0.5 || Math.abs(dyHead) < 0.5) return true;
            }
        }
        return false;
    }

    function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.1);
        dayTime += dt * 0.02;
        scene.background = new THREE.Color(0x87ceeb).lerp(new THREE.Color(0x050510), 1 - (Math.sin(dayTime)+1)/2);
        
        velocity.y -= 22 * dt;
        let nY = camera.position.y + velocity.y * dt;
        if (!checkCollision(new THREE.Vector3(camera.position.x, nY, camera.position.z))) {
            camera.position.y = nY; canJump = false;
        } else {
            if(velocity.y < 0) canJump = true;
            velocity.y = 0;
        }

        if (moveDir.x || moveDir.y) {
            const speed = 6 * dt;
            const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            const side = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
            fwd.y = 0; side.y = 0; fwd.normalize(); side.normalize();
            const moveV = fwd.multiplyScalar(moveDir.y * speed).add(side.multiplyScalar(moveDir.x * speed));
            if (!checkCollision(new THREE.Vector3(camera.position.x + moveV.x, camera.position.y, camera.position.z))) camera.position.x += moveV.x;
            if (!checkCollision(new THREE.Vector3(camera.position.x, camera.position.y, camera.position.z + moveV.z))) camera.position.z += moveV.z;
        }
        if (camera.position.y < -15) camera.position.set(0, 18, 0);
        document.getElementById('coords').innerText = `${Math.floor(camera.position.x)},${Math.floor(camera.position.y)},${Math.floor(camera.position.z)}`;
        renderer.render(scene, camera);
    }

    window.setSlot = (n, type) => {
        selectedBlock = type;
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
        document.getElementById('slot-'+n).classList.add('selected');
    };

    function updateBlockCount() { document.getElementById('b-count').innerText = blocks.length; }
    window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
</script>
</body>
</html>
