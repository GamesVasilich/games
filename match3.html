<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Три в ряд</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Arial', sans-serif;
      background: #2c3e50;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      touch-action: none;
    }
    .container {
      width: 90%;
      max-width: 500px;
      text-align: center;
    }
    h1 {
      color: #ecf0f1;
      margin-bottom: 20px;
      font-size: 2rem;
    }
    #score {
      font-size: 1.5rem;
      color: #f39c12;
      margin: 15px 0;
    }
    #game-board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
      margin: 0 auto;
      max-width: 480px;
    }
    .cell {
      width: 100%;
      height: 0;
      padding-bottom: 100%;
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
    }
    .gem {
      position: absolute;
      inset: 2px;
      border-radius: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      transition: transform 0.2s, opacity 0.2s;
    }
    /* Цвета камней */
    .red { background: #e74c3c; color: white; }
    .blue { background: #3498db; color: white; }
    .green { background: #2ecc71; color: white; }
    .yellow { background: #f1c40f; color: white; }
    .purple { background: #9b59b6; color: white; }
    .orange { background: #d35400; color: white; }

    /* Эффекты */
    .cell:hover .gem { transform: scale(1.1); }
    .selected { border: 3px solid white; }
    .match { animation: flash 0.5s infinite; }

    @keyframes flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    button {
      margin: 20px auto;
      padding: 12px 24px;
      background: #e67e22;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      display: block;
    }
    button:hover { background: #d35400; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Три в ряд</h1>
    <div id="score">Очки: 0</div>
    <div id="game-board"></div>
    <button onclick="resetGame()">Начать заново</button>
     <div class="cube" onclick="location.href='index.html'">в меню</div>
  </div>

  <script>
    const BOARD_SIZE = 8;
    const GEM_TYPES = ['red', 'blue', 'green', 'yellow', 'purple', 'orange'];
    let board = [];
    let score = 0;
    let selectedCell = null;
    let isProcessing = false;

    const gameBoard = document.getElementById('game-board');
    const scoreDisplay = document.getElementById('score');

    // Создание игрового поля
    function createBoard() {
      board = Array(BOARD_SIZE).fill().map(() =>
        Array(BOARD_SIZE).fill(null)
      );

      for (let y = 0; y < BOARD_SIZE; y++) {
        for (let x = 0; x < BOARD_SIZE; x++) {
          board[y][x] = GEM_TYPES[Math.floor(Math.random() * GEM_TYPES.length)];
        }
      }
    }

    // Рендеринг поля
    function renderBoard() {
      gameBoard.innerHTML = '';
      for (let y = 0; y < BOARD_SIZE; y++) {
        for (let x = 0; x < BOARD_SIZE; x++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.x = x;
          cell.dataset.y = y;

          const gem = document.createElement('div');
          gem.className = `gem ${board[y][x]}`;
          gem.textContent = '●';

          cell.appendChild(gem);
          gameBoard.appendChild(cell);

          cell.addEventListener('click', handleCellClick);
        }
      }
    }

    // Обработка клика по клетке
    function handleCellClick(e) {
      if (isProcessing) return;

      const cell = e.currentTarget;
      const x = parseInt(cell.dataset.x);
      const y = parseInt(cell.dataset.y);

      if (!selectedCell) {
        selectedCell = { x, y };
        cell.classList.add('selected');
      } else {
        if (areAdjacent(selectedCell, { x, y })) {
          swapGems(selectedCell.x, selectedCell.y, x, y);
          selectedCell = null;
          clearSelection();
        } else {
          clearSelection();
          selectedCell = { x, y };
          cell.classList.add('selected');
        }
      }
    }

    // Проверка соседства клеток
    function areAdjacent(a, b) {
      return Math.abs(a.x - b.x) + Math.abs(a.y - b.y) === 1;
    }

    // Обмен камнями
    function swapGems(x1, y1, x2, y2) {
      isProcessing = true;

      // Обмен в данных
      [board[y1][x1], board[y2][x2]] = [board[y2][x2], board[y1][x1]];

      renderBoard();

      setTimeout(() => {
        const matches = findMatches();
        if (matches.length > 0) {
          processMatches(matches);
        } else {
          // Возврат обмена, если нет совпадений
          [board[y1][x1], board[y2][x2]] = [board[y2][x2], board[y1][x1]];
          renderBoard();
          isProcessing = false;
        }
      }, 300);
    }

    // Поиск совпадений
    function findMatches() {
      const matches = [];

      // Проверка по горизонтали
      for (let y = 0; y < BOARD_SIZE; y++) {
        for (let x = 0; x < BOARD_SIZE - 2; x++) {
          if (board[y][x] && board[y][x] === board[y][x+1] && board[y][x] === board[y][x+2]) {
            for (let i = 0; i < 3; i++) matches.push({ x: x+i, y });
          }
        }
      }

      // Проверка по вертикали
      for (let x = 0; x < BOARD_SIZE; x++) {
        for (let y = 0; y < BOARD_SIZE - 2; y++) {
          if (board[y][x] && board[y][x] === board[y+1][x] && board[y][x] === board[y+2][x]) {
                       for (let i = 0; i < 3; i++) matches.push({ x, y: y+i });
          }
        }
      }

      return matches;
    }

    // Обработка совпадений
    function processMatches(matches) {
      // Удаляем совпавшие камни
      matches.forEach(pos => {
        board[pos.y][pos.x] = null;
        const cell = document.querySelector(`.cell[data-x="${pos.x}"][data-y="${pos.y}"]`);
        if (cell) cell.classList.add('match');
      });

      score += matches.length * 10;
      scoreDisplay.textContent = `Очки: ${score}`;

      setTimeout(() => {
        // Анимируем удаление
        matches.forEach(pos => {
          const cell = document.querySelector(`.cell[data-x="${pos.x}"][data-y="${pos.y}"]`);
          if (cell) {
            cell.classList.remove('match');
            cell.querySelector('.gem').style.opacity = '0';
          }
        });

        // Пауза для анимации
        setTimeout(() => {
          fallGems();
          fillEmptyCells();
          renderBoard();

          // Проверяем новые совпадения
          const newMatches = findMatches();
          if (newMatches.length > 0) {
            processMatches(newMatches);
          } else {
            isProcessing = false;
          }
        }, 300);
      }, 500);
    }

    // Падение камней
    function fallGems() {
      for (let x = 0; x < BOARD_SIZE; x++) {
        let empty = 0;
        for (let y = BOARD_SIZE - 1; y >= 0; y--) {
          if (!board[y][x]) {
            empty++;
          } else if (empty > 0) {
            board[y + empty][x] = board[y][x];
            board[y][x] = null;
          }
        }
      }
    }

    // Заполнение пустых клеток
    function fillEmptyCells() {
      for (let y = 0; y < BOARD_SIZE; y++) {
        for (let x = 0; x < BOARD_SIZE; x++) {
          if (!board[y][x]) {
            board[y][x] = GEM_TYPES[Math.floor(Math.random() * GEM_TYPES.length)];
          }
        }
      }
    }

    // Снятие выделения
    function clearSelection() {
      document.querySelectorAll('.cell').forEach(cell => {
        cell.classList.remove('selected');
      });
    }

    // Перезапуск игры
    function resetGame() {
      score = 0;
      scoreDisplay.textContent = 'Очки: 0';
      createBoard();
      renderBoard();
    }

    // Инициализация
    resetGame();

    // Адаптация под мобильные устройства
    document.addEventListener('touchstart', e => {
      if (e.target.matches('.cell')) {
        e.preventDefault(); // предотвращаем стандартное поведение
        handleCellClick(e);
      }
    }, { passive: false });

    // Для десктопов
    document.addEventListener('click', e => {
      if (e.target.matches('.cell *')) {
        handleCellClick(e);
      }
    });
  </script>
</body>
</html>
