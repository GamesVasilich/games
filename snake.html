<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Змейка</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #263238;
      color: white;
      margin: 0;
      padding: 10px;
      touch-action: none;
    }
    .container {
      max-width: 90%;
      margin: 0 auto;
      padding: 15px;
      background: #37474f;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    h1 {
      margin-bottom: 15px;
      color: #4caf50;
      font-size: 1.8rem;
    }
    #game-area {
      width: 100%;
      height: 0;
      padding-top: 100%;
      position: relative;
      border: 3px solid #546e7a;
      margin: 15px auto;
      background: #1b262c;
      overflow: hidden;
      touch-action: none;
    }
    .snake-part {
      position: absolute;
      width: 5vw;
      height: 5vw;
      max-width: 20px;
      max-height: 20px;
      background: #4caf50;
      border-radius: 50%;
      transition: left 0.1s, top 0.1s;
    }
    .food {
      position: absolute;
      width: 5vw;
      height: 5vw;
      max-width: 20px;
      max-height: 20px;
      background: #ff5722;
      border-radius: 50%;
    }
    #score {
      font-size: 1.6rem;
      margin: 12px 0;
      color: #ffeb3b;
    }
    button {
      padding: 12px 24px;
      background: #009688;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      margin: 5px;
      touch-action: manipulation;
    }
    button:hover {
      background: #00796b;
    }
    a {
      display: inline-block;
      margin-top: 15px;
      color: #009688;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1rem;
    }

    /* Стили для мобильных кнопок управления */
    .controls-container {
      display: none;
      width: 100%;
      max-width: 400px;
      margin: 15px auto 0;
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
    }

    .control-row {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 10px;
    }

    .control-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 70px;
      height: 70px;
      background: #009688;
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      font-size: 1rem;
    }

    .control-btn:hover {
      background: #00796b;
      transform: translateY(-2px);
    }

    .control-btn:active {
      background: #00564d;
      transform: translateY(0);
    }

    .arrow {
      font-size: 1.8rem;
      line-height: 1;
      margin-bottom: 4px;
    }

    .label {
      font-size: 0.8rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Змейка-пк</h1>
    <div id="score">Счёт: 0</div>
    <div id="game-area"></div>

    <!-- Мобильные кнопки управления -->
    <div id="mobile-controls" class="controls-container">
      <div class="control-row">
        <button class="control-btn" data-dir="up">
          <span class="arrow">↑</span>
          <span class="label">Вверх</span>
        </button>
      </div>
      <div class="control-row">
        <button class="control-btn" data-dir="left">
          <span class="arrow">←</span>
          <span class="label">Влево</span>
        </button>
        <button class="control-btn" data-dir="down">
          <span class="arrow">↓</span>
          <span class="label">Вниз</span>
        </button>
        <button class="control-btn" data-dir="right">
          <span class="arrow">→</span>
          <span class="label">Вправо</span>
        </button>
      </div>
    </div>

    <button onclick="resetGame()">Начать заново</button>
    <a href="index.html">← В меню</a>
  </div>

  <script>
    const gameArea = document.getElementById('game-area');
    const scoreDisplay = document.getElementById('score');
    let snake = [{ x: 10, y: 10 }];
    let food = { x: 15, y: 15 };
    let dx = 0, dy = 1;
    let score = 0;
    let gameLoop;
    let isGameOver = false;
    let lastTouch = null;

    const GRID_SIZE = 20;

    // Адаптивный расчёт размера клетки
    function getCellSize() {
      return Math.min(gameArea.clientWidth, gameArea.clientHeight) / GRID_SIZE;
    }

    // Создание элемента
    function createElement(className, x, y) {
      const element = document.createElement('div');
      element.className = className;
      const cellSize = getCellSize();
      element.style.left = x * cellSize + 'px';
      element.style.top = y * cellSize + 'px';
      gameArea.appendChild(element);
      return element;
    }

    // Отрисовка змеи
    function drawSnake() {
      snake.forEach((part, index) => {
        const snakePart = createElement('snake-part', part.x, part.y);
        if (index === 0) {
          snakePart.style.background = '#2e7d32';
        }
      });
    }

    // Генерация еды
    function generateFood() {
      food.x = Math.floor(Math.random() * GRID_SIZE);
      food.y = Math.floor(Math.random() * GRID_SIZE);

      for (let part of snake) {
        if (part.x === food.x && part.y === food.y) {
          generateFood();
          return;
        }
      }

      createElement('food', food.x, food.y);
    }

    // Проверка столкновений
        function checkCollision() {
      const head = snake[0];

      // Столкновение со стеной
      if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
        return true;
      }

      // Столкновение с телом
      for (let i = 1; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
          return true;
        }
      }

      return false;
    }

    // Обновление игры
    function gameUpdate() {
      if (isGameOver) return;

      const newHead = { x: snake[0].x + dx, y: snake[0].y + dy };
      snake.unshift(newHead);

      // Съели еду?
      if (newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        scoreDisplay.textContent = `Счёт: ${score}`;
        generateFood();
      } else {
        snake.pop();
      }

      if (checkCollision()) {
        isGameOver = true;
        clearInterval(gameLoop);
        alert(`Игра окончена! Ваш счёт: ${score}`);
        return;
      }

      gameArea.innerHTML = '';
      drawSnake();
      createElement('food', food.x, food.y);
    }

    // Сброс игры
    function resetGame() {
      isGameOver = false;
      snake = [{ x: 10, y: 10 }];
      dx = 0; dy = 1;
      score = 0;
      scoreDisplay.textContent = 'Счёт: 0';

      gameArea.innerHTML = '';
      generateFood();
      drawSnake();

      clearInterval(gameLoop);
      gameLoop = setInterval(gameUpdate, 200);
    }

    // Обработка клавиатуры
    function handleKeyPress(e) {
      switch (e.key) {
        case 'ArrowUp':
          if (dy !== 1) { dx = 0; dy = -1; }
          break;
        case 'ArrowDown':
          if (dy !== -1) { dx = 0; dy = 1; }
          break;
        case 'ArrowLeft':
          if (dx !== 1) { dx = -1; dy = 0; }
          break;
        case 'ArrowRight':
          if (dx !== -1) { dx = 1; dy = 0; }
          break;
      }
    }

    // Обработка тач-событий
    function handleTouchStart(e) {
      const touch = e.touches[0];
      lastTouch = { x: touch.clientX, y: touch.clientY };
    }

    function handleTouchMove(e) {
      if (!lastTouch) return;

      const touch = e.touches[0];
      const dx = touch.clientX - lastTouch.x;
      const dy = touch.clientY - lastTouch.y;

      // Определяем направление свайпа
      if (Math.abs(dx) > Math.abs(dy)) {
        // Горизонтальный свайп
        if (dx > 30) {  // вправо
          if (dx !== -1) { dx = 1; dy = 0; }
        } else if (dx < -30) {  // влево
          if (dx !== 1) { dx = -1; dy = 0; }
        }
      } else {
        // Вертикальный свайп
        if (dy > 30) {  // вниз
          if (dy !== -1) { dx = 0; dy = 1; }
        } else if (dy < -30) {  // вверх
          if (dy !== 1) { dx = 0; dy = -1; }
        }
      }

      lastTouch = null; // Сброс после обработки
    }

    // Предотвращение стандартного поведения браузера
    function preventDefault(e) {
      e.preventDefault();
    }

    // Функция для обновления видимости мобильных кнопок
    function updateControlsVisibility() {
      const mobileControls = document.getElementById('mobile-controls');
      if (window.innerWidth < 768) {
        mobileControls.style.display = 'block';
      } else {
        mobileControls.style.display = 'none';
      }
    }

    // Обработчик нажатия кнопок управления
    function handleControlButton(direction) {
      switch (direction) {
        case 'up':
          if (dy !== 1) { dx = 0; dy = -1; }
          break;
        case 'down':
          if (dy !== -1) { dx = 0; dy = 1; }
          break;
        case 'left':
          if (dx !== 1) { dx = -1; dy = 0; }
          break;
        case 'right':
          if (dx !== -1) { dx = 1; dy = 0; }
          break;
      }
    }

    // Привязываем обработчики к кнопкам
    document.querySelectorAll('.control-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        handleControlButton(btn.dataset.dir);
      });
    });

    // Инициализация
    window.addEventListener('keydown', handleKeyPress);
    gameArea.addEventListener('touchstart', handleTouchStart, { passive: false });
    gameArea.addEventListener('touchmove', handleTouchMove, { passive: false });
    gameArea.addEventListener('touchmove', preventDefault, { passive: false });

    // Вызываем при загрузке и при изменении размера окна
    updateControlsVisibility();
    window.addEventListener('resize', updateControlsVisibility);

    // Запуск игры
    resetGame();

    // Адаптация при изменении размера окна
    window.addEventListener('resize', () => {
      if (!isGameOver) {
        gameArea.innerHTML = '';
        drawSnake();
        createElement('food', food.x, food.y);
      }
    });
  </script>
</body>
</html>
