<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Крестики-нолики</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #e0f7fa; }
    .board { display: grid; grid-template-columns: repeat(3,100px); gap: 5px; margin: 50px auto; }
    .cell { width: 100px; height: 100px; background: #fff; display: flex; justify-content: center; align-items: center; font-size: 40px; cursor: pointer; border: 2px solid #000; }
    #status { margin: 20px; font-size: 1.5rem; font-weight: bold; }
    button { padding: 10px 20px; background: #00796b; color: white; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Крестики‑нолики</h1>
  <div id="status">Ход: X</div>
  <div class="board" id="board">
    <div class="cell" data-idx="0"></div>
    <div class="cell" data-idx="1"></div>
    <div class="cell" data-idx="2"></div>
    <div class="cell" data-idx="3"></div>
    <div class="cell" data-idx="4"></div>
    <div class="cell" data-idx="5"></div>
    <div class="cell" data-idx="6"></div>
    <div class="cell" data-idx="7"></div>
    <div class="cell" data-idx="8"></div>
  </div>
  <button onclick="resetGame()">Новая игра</button>
  <a href="index.html" style="display:block;margin:20px;">← В меню</a>

  <script>
    let currentPlayer = 'X';
    const board = Array(9).fill(null);
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    function handleClick(e) {
      const idx = e.target.getAttribute('data-idx');
      if (board[idx] || checkWinner()) return;

      board[idx] = currentPlayer;
      e.target.textContent = currentPlayer;

      if (checkWinner()) {
        status.textContent = `Победа: ${currentPlayer}!`;
      } else if (board.every(cell => cell)) {
        status.textContent = 'Ничья!';
      } else {
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        status.textContent = `Ход: ${currentPlayer}`;
      }
    }

    function checkWinner() {
      const lines = [
        [0,1,2], [3,4,5], [6,7,8], // строки
        [0,3,6], [1,4,7], [2,5,8], // столбцы
        [0,4,8], [2,4,6]            // диагонали
      ];
      for (const [a,b,c] of lines) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return true;
      }
      return false;
    }

    function resetGame() {
      board.fill(null);
      cells.forEach(cell => cell.textContent = '');
      currentPlayer = 'X';
      status.textContent = 'Ход: X';
    }

    cells.forEach(cell => cell.addEventListener('click', handleClick));
  </script>
</body>
</html>
